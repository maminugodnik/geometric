<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор порошковой покраски</title>

<style>
body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#eef2f7;
    color:#111;
}

.container{
    max-width:920px;
    margin:40px auto;
    padding:0 16px;
}

h1{
    text-align:center;
    font-size:26px;
    margin-bottom:30px;
}

/* ===== CARD ===== */
.card{
    background:#fff;
    border-radius:16px;
    padding:22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-bottom:18px;
}

/* ===== SECTIONS ===== */
.section-title{
    font-size:16px;
    font-weight:700;
    margin:20px 0 10px;
    color:#333;
}

/* ===== INPUTS ===== */
.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

@media (max-width:700px){
    .row{grid-template-columns:1fr;}
}

label{
    font-size:13px;
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

input,select{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid #e5e7eb;
    background:#fafafa;
    font-size:14px;
    box-sizing:border-box;
}

input:focus,select:focus{
    outline:none;
    border-color:#111;
    background:#fff;
}

/* ===== TOGGLE BLOCK ===== */
.toggle-block{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-radius:12px;
    background:#f7f8fa;
    border:1px solid #eee;
    margin-top:12px;
}

.toggle-block span{
    font-size:14px;
    font-weight:600;
}

/* SWITCH */
.switch{
    position:relative;
    width:44px;
    height:24px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;left:0;right:0;bottom:0;
    background:#cfd4dc;
    border-radius:34px;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    height:18px;
    width:18px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#111;
}

.switch input:checked + .slider:before{
    transform:translateX(20px);
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#111;
    color:#fff;
    font-size:15px;
    margin-top:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* ===== RESULT ===== */
.result{
    margin-top:14px;
    background:#f7f8fa;
    padding:14px;
    border-radius:12px;
    font-size:15px;
    line-height:1.5;
}

/* ===== DIVIDER ===== */
.divider{
    height:1px;
    background:#e5e7eb;
    margin:30px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>Калькулятор порошковой покраски</h1>

<div class="card">

<div class="section-title">Основные параметры</div>

<div class="row">
<div>
<label>Площадь (м²)</label>
<input id="area_est">
</div>

<div>
<label>Расход (г/м²)</label>
<input id="paint_norm" value="150">
</div>
</div>

<label>Цена краски (₽/кг)</label>
<input id="paint_price_est" value="400">

<div class="section-title">Подготовка</div>

<!-- ПЕСОК -->
<div class="toggle-block">
<span>Пескоструй</span>
<label class="switch">
<input type="checkbox" id="sand_est">
<span class="slider"></span>
</label>
</div>
<input id="sand_norm" value="500">
<select id="sand_coef_est">
  <option value="1">Лёгкая (0%)</option>
  <option value="1.2">Средняя (+20%)</option>
  <option value="1.5">Сложная (+50%)</option>
  <option value="2">Очень сложная (+100%)</option>
</select>

<!-- ЗАЧИСТКА -->
<div class="toggle-block">
<span>Зачистка</span>
<label class="switch">
<input type="checkbox" id="grind_est">
<span class="slider"></span>
</label>
</div>
<input id="grind_norm" value="250">
<select id="grind_coef_est">
  <option value="1">Лёгкая (0%)</option>
  <option value="1.2">Средняя (+20%)</option>
  <option value="1.5">Сложная (+50%)</option>
  <option value="2">Очень сложная (+100%)</option>
</select>

<!-- ОБЕЗЖИРИВАНИЕ -->
<div class="toggle-block">
<span>Обезжиривание</span>
<label class="switch">
<input type="checkbox" id="clean_est">
<span class="slider"></span>
</label>
</div>
<input id="clean_norm" value="150">
<select id="clean_coef_est">
  <option value="1">Лёгкая (0%)</option>
  <option value="1.2">Средняя (+20%)</option>
  <option value="1.5">Сложная (+50%)</option>
  <option value="2">Очень сложная (+100%)</option>
</select>

<!-- ТЯЖЕЛОЕ -->
<div class="toggle-block">
<span>Тяжёлое изделие</span>
<label class="switch">
<input type="checkbox" id="heavy_est">
<span class="slider"></span>
</label>
</div>

<input id="heavy_cost_est" value="800">

<div class="section-title">Дополнительно</div>

<div class="row">
<div>
<label>Газ (₽)</label>
<input id="gas_norm" value="400">
</div>

<div>
<label>Электричество (₽)</label>
<input id="electric_norm" value="200">
</div>
</div>

<label>Маржа</label>
<select id="margin">
  <option value="1">x1</option>
  <option value="1.5">x1.5</option>
  <option value="2">x2</option>
  <option value="3">x3</option>
  <option value="4">x4</option>
  <option value="5">x5</option>
  <option value="7">x7</option>
</select>

<div class="toggle-block">
<span>Налог 13%</span>
<label class="switch">
<input type="checkbox" id="tax">
<span class="slider"></span>
</label>
</div>

<button onclick="calcEst()">Рассчитать</button>

<div class="result" id="result_est"></div>

</div>

<div class="divider"></div>

<div class="card">

<div class="section-title">Расход краски</div>

<label>Площадь</label>
<input id="paint_area_only">

<label>Засыпано (кг)</label>
<input id="paint_in_only">

<label>Остаток (кг)</label>
<input id="paint_out_only">

<button onclick="calcPaintOnly()">Рассчитать</button>

<div class="result" id="result_paint_only"></div>

</div>

</div>

<script>

function getNum(id){
    return parseFloat((document.getElementById(id).value || "0").replace(",", "."));
}

function calcEst(){

    let area = getNum('area_est');

    let paint = area * (getNum('paint_norm') / 1000) * getNum('paint_price_est');

    let prep =
        (document.getElementById('sand_est').checked ? getNum('sand_norm') * getNum('sand_coef_est') : 0)
        +
        (document.getElementById('grind_est').checked ? getNum('grind_norm') * getNum('grind_coef_est') : 0)
        +
        (document.getElementById('clean_est').checked ? getNum('clean_norm') * getNum('clean_coef_est') : 0);

    let heavy = document.getElementById('heavy_est').checked ? getNum('heavy_cost_est') : 0;

    let cost = paint + prep + getNum('gas_norm') + getNum('electric_norm') + heavy;

    let margin = cost * getNum('margin');

    let tax = document.getElementById('tax').checked ? margin * 0.13 : 0;

    let finalPrice = margin + tax;

    document.getElementById('result_est').innerHTML =
        "Себестоимость: " + Math.round(cost) + " ₽<br>" +
        "С маржой: " + Math.round(margin) + " ₽<br>" +
        "Налог: " + Math.round(tax) + " ₽<br><br>" +
        "ИТОГ: " + Math.round(finalPrice) + " ₽";
}

function calcPaintOnly(){

    let area = getNum('paint_area_only');
    let inKg = getNum('paint_in_only');
    let outKg = getNum('paint_out_only');

    let used = Math.max(inKg - outKg, 0);

    if(area <= 0){
        document.getElementById('result_paint_only').innerHTML = "Укажи площадь";
        return;
    }

    let gPerM2 = (used * 1000) / area;

    document.getElementById('result_paint_only').innerHTML =
        "Израсходовано: " + used.toFixed(2) + " кг<br>" +
        "Расход: " + gPerM2.toFixed(1) + " г/м²";
}

</script>

</body>
</html>
