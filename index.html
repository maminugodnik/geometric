<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор порошковой покраски</title>

<style>
body{
    font-family: Arial;
    max-width: 920px;
    margin: 40px auto;
    padding: 10px;
}

h1{ margin-bottom:20px; }

.card{
    border:1px solid #eee;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:700;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    box-sizing:border-box;
    border:1px solid #ddd;
    border-radius:6px;
}

.checkline{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border:1px solid #eee;
    border-radius:8px;
    background:#fafafa;
    margin-top:8px;
}

.checkline input{
    width:18px;
    height:18px;
}

button{
    width:100%;
    padding:14px;
    background:black;
    color:white;
    border:0;
    font-size:16px;
    margin-top:15px;
    border-radius:6px;
}

.result{
    margin-top:15px;
    font-size:16px;
    line-height:1.6;
}

.split{
    height:1px;
    background:#eee;
    margin:40px 0;
}
</style>
</head>

<body>

<h1>Калькулятор порошковой покраски</h1>

<div class="card">

<label>Площадь изделия (м²)</label>
<input id="area_est" type="number">

<label>Расход краски (г/м²)</label>
<input id="paint_norm" value="150" type="number">

<label>Цена краски (₽/кг)</label>
<input id="paint_price_est" value="400" type="number">

<!-- ПЕСОК -->
<label class="checkline"><input type="checkbox" id="sand_est"> Пескоструй</label>
<input id="sand_norm" value="500" type="number">

<label>Сложность пескоструя</label>
<select id="sand_coef_est">
  <option value="1">Лёгкая (0%)</option>
  <option value="1.2">Средняя (+20%)</option>
  <option value="1.5">Сложная (+50%)</option>
  <option value="2">Очень сложная (+100%)</option>
</select>

<!-- ЗАЧИСТКА -->
<label class="checkline"><input type="checkbox" id="grind_est"> Зачистка</label>
<input id="grind_norm" value="250" type="number">

<label>Сложность зачистки</label>
<select id="grind_coef_est">
  <option value="1">Лёгкая (0%)</option>
  <option value="1.2">Средняя (+20%)</option>
  <option value="1.5">Сложная (+50%)</option>
  <option value="2">Очень сложная (+100%)</option>
</select>

<!-- ОБЕЗЖИРИВАНИЕ -->
<label class="checkline"><input type="checkbox" id="clean_est"> Обезжиривание</label>
<input id="clean_norm" value="150" type="number">

<label>Сложность обезжиривания</label>
<select id="clean_coef_est">
  <option value="1">Лёгкая (0%)</option>
  <option value="1.2">Средняя (+20%)</option>
  <option value="1.5">Сложная (+50%)</option>
  <option value="2">Очень сложная (+100%)</option>
</select>

<label class="checkline"><input type="checkbox" id="heavy_est"> Тяжёлое изделие</label>
<input id="heavy_cost_est" value="800" type="number">

<label>Газ (₽)</label>
<input id="gas_norm" value="400" type="number">

<label>Электричество (₽)</label>
<input id="electric_norm" value="200" type="number">

<label>Маржа</label>
<select id="margin">
  <option value="1">x1</option>
  <option value="1.5">x1.5</option>
  <option value="2">x2</option>
  <option value="3">x3</option>
</select>

<label class="checkline"><input type="checkbox" id="tax"> Налог 13%</label>

<button onclick="calcEst()">Рассчитать</button>

<div class="result" id="result_est"></div>

</div>

<div class="split"></div>

<div class="card">

<h2>Расход краски</h2>

<label>Площадь (м²)</label>
<input id="paint_area_only" type="number">

<label>Вход (кг)</label>
<input id="paint_in_only" type="number">

<label>Остаток (кг)</label>
<input id="paint_out_only" type="number">

<button onclick="calcPaintOnly()">Рассчитать</button>

<div class="result" id="result_paint_only"></div>

</div>

<script>

function n(id){
  return parseFloat(document.getElementById(id).value || 0);
}

function calcEst(){

    let area = n('area_est');

    let paint = area * (n('paint_norm') / 1000) * n('paint_price_est');

    let prep =
        (document.getElementById('sand_est').checked ? n('sand_norm') * n('sand_coef_est') : 0)
      + (document.getElementById('grind_est').checked ? n('grind_norm') * n('grind_coef_est') : 0)
      + (document.getElementById('clean_est').checked ? n('clean_norm') * n('clean_coef_est') : 0);

    let heavy = document.getElementById('heavy_est').checked ? n('heavy_cost_est') : 0;

    let cost = paint + prep + n('gas_norm') + n('electric_norm') + heavy;

    let margin = cost * n('margin');

    let tax = document.getElementById('tax').checked ? margin * 0.13 : 0;

    let final = margin + tax;

    document.getElementById('result_est').innerHTML =
        "Себестоимость: " + Math.round(cost) + " ₽<br>" +
        "С маржой: " + Math.round(margin) + " ₽<br>" +
        "Налог: " + Math.round(tax) + " ₽<br><br>" +
        "Итого: " + Math.round(final) + " ₽";
}

function calcPaintOnly(){

    let area = n('paint_area_only');
    let inKg = n('paint_in_only');
    let outKg = n('paint_out_only');

    let used = Math.max(inKg - outKg, 0);

    if(area <= 0){
        document.getElementById('result_paint_only').innerHTML = "Укажи площадь";
        return;
    }

    let g = (used * 1000) / area;

    document.getElementById('result_paint_only').innerHTML =
        "Расход: " + used.toFixed(2) + " кг<br>" +
        g.toFixed(1) + " г/м²";
}

</script>

</body>
</html>
