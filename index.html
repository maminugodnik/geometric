<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Калькулятор порошковой покраски</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html{
    width:100%;
    overflow-x:hidden;
}

body{
    margin:0;
    width:100%;
    overflow-x:hidden;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:#0b0f14;
    color:#e6f1ff;
}

body::before,
body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    filter:blur(140px);
    z-index:-1;
    pointer-events:none;
}

body::before{
    background:#00ff88;
    opacity:.18;
    top:-200px;
    left:-200px;
    animation:glowIntro 1.4s ease-out both;
}

body::after{
    background:#00b7ff;
    opacity:.12;
    bottom:-200px;
    right:-200px;
    animation:glowIntro 1.4s ease-out .15s both;
}

.container{
    width:100%;
    max-width:920px;
    margin:0 auto;
    padding:24px 16px 40px;
}

h1{
    text-align:center;
    color:#7CFFB2;
    margin:0 0 24px;
    font-size:clamp(24px,5vw,38px);
    line-height:1.2;
    word-break:break-word;
    animation:titleIntro .75s cubic-bezier(.2,.8,.2,1) .12s both;
}

h2{
    margin-top:0;
    font-size:clamp(18px,4vw,26px);
    line-height:1.3;
}

.card{
    width:100%;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
    padding:22px;
    margin-bottom:18px;
    overflow:hidden;
    opacity:0;
    transform:translateY(22px) scale(.985);
    animation:cardIntro .75s cubic-bezier(.2,.8,.2,1) forwards;
}

.card:nth-of-type(1){
    animation-delay:.05s;
}

.card:nth-of-type(2){
    animation-delay:.18s;
}

.card:nth-of-type(3){
    animation-delay:.31s;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    width:100%;
}

.group{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:12px;
    width:100%;
}

label{
    font-size:13px;
    color:#b7c7d9;
    line-height:1.4;
}

input,
select{
    width:100%;
    min-width:0;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.05);
    color:#7CFFB2;
    font-size:16px;
    outline:none;
    transition:.2s;
}

input{
    appearance:none;
    -webkit-appearance:none;
}

input:focus,
select:focus{
    border-color:#7CFFB2;
    box-shadow:0 0 0 3px rgba(124,255,178,.15);
}

select option{
    background:#0b0f14;
    color:#ffffff;
}

.toggle{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:14px;
    margin-top:16px;
    border-radius:14px;
    background:rgba(255,255,255,0.04);
}

.toggle span{
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
}

.switch{
    position:relative;
    width:46px;
    height:24px;
    flex-shrink:0;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;
    background:#2a2f3a;
    border-radius:30px;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#7CFFB2;
}

.switch input:checked + .slider:before{
    transform:translateX(22px);
}

.block{
    overflow:hidden;
    max-height:0;
    opacity:0;
    transform:translateY(-8px);
    transition:
        max-height .35s ease,
        opacity .35s ease,
        transform .35s ease;
}

.block.show{
    max-height:500px;
    opacity:1;
    transform:translateY(0);
}

button{
    width:100%;
    margin-top:18px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#7CFFB2,#00b7ff);
    color:#051017;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.98);
}

.result{
    width:100%;
    margin-top:16px;
    padding:16px;
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    color:#7CFFB2;
    line-height:1.7;
    overflow-wrap:break-word;
    word-break:break-word;
    font-size:15px;
}

@keyframes cardIntro{
    from{
        opacity:0;
        transform:translateY(22px) scale(.985);
        filter:blur(8px);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
    }
}

@keyframes titleIntro{
    from{
        opacity:0;
        transform:translateY(-10px);
        text-shadow:0 0 0 rgba(124,255,178,0);
    }

    to{
        opacity:1;
        transform:translateY(0);
        text-shadow:0 0 26px rgba(124,255,178,.18);
    }
}

@keyframes glowIntro{
    from{
        opacity:0;
        transform:scale(.72);
    }

    to{
        transform:scale(1);
    }
}

@media (prefers-reduced-motion:reduce){
    *,
    *::before,
    *::after{
        animation-duration:.01ms !important;
        animation-iteration-count:1 !important;
        scroll-behavior:auto !important;
        transition-duration:.01ms !important;
    }

    .card{
        opacity:1;
        transform:none;
        filter:none;
    }
}

@media (max-width:700px){
    .container{
        padding:14px 12px 30px;
    }

    .card{
        padding:16px;
        border-radius:16px;
    }

    .grid{
        grid-template-columns:1fr;
        gap:10px;
    }

    .toggle{
        padding:12px;
    }

    input,
    select{
        padding:13px;
    }

    button{
        padding:15px;
    }

    body::before,
    body::after{
        width:320px;
        height:320px;
        filter:blur(90px);
    }
}

@media (max-width:420px){
    h1{
        font-size:24px;
    }

    .card{
        padding:14px;
    }

    .toggle span{
        font-size:14px;
    }

    label{
        font-size:12px;
    }

    input,
    select{
        font-size:16px;
        padding:12px;
    }

    .result{
        font-size:14px;
    }
}
</style>
</head>

<body>
<div class="container">
<div class="card">
<h1>Калькулятор порошковой покраски</h1>

<div class="group">
<label>Площадь (м²)</label>
<input id="area_est" inputmode="decimal">

<label>Расход краски (г/м²)</label>
<input id="paint_norm" value="150" inputmode="decimal">

<label>Цена краски (₽/кг)</label>
<input id="paint_price_est" value="400" inputmode="decimal">

<div class="toggle">
<span>Пескоструй</span>
<label class="switch">
<input type="checkbox" onchange="toggle('sand_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="sand_block">
<div class="group">
<label>Цена пескоструя (₽)</label>
<input id="sand_price" value="500" inputmode="decimal">

<label>Сложность</label>
<select id="sand_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>
</div>

<div class="toggle">
<span>Зачистка</span>
<label class="switch">
<input type="checkbox" onchange="toggle('grind_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="grind_block">
<div class="group">
<label>Цена зачистки (₽)</label>
<input id="grind_price" value="250" inputmode="decimal">

<label>Сложность</label>
<select id="grind_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>
</div>

<div class="toggle">
<span>Обезжиривание</span>
<label class="switch">
<input type="checkbox" onchange="toggle('clean_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="clean_block">
<div class="group">
<label>Цена обезжиривания (₽)</label>
<input id="clean_price" value="150" inputmode="decimal">

<label>Сложность</label>
<select id="clean_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>
</div>

<div class="toggle">
<span>Тяжелое изделие</span>
<label class="switch">
<input type="checkbox" onchange="toggle('heavy_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="heavy_block">
<div class="group">
<label>Цена за тяжелое изделие (₽)</label>
<input id="heavy_price" value="500" inputmode="decimal">

<label>Сложность</label>
<select id="heavy_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>
</div>

<div class="toggle">
<span>Газ</span>
<label class="switch">
<input type="checkbox" onchange="toggle('gas_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="gas_block">
<div class="group">
<label>Газ (₽)</label>
<input id="gas_norm" value="400" inputmode="decimal">
</div>
</div>

<div class="toggle">
<span>Электричество</span>
<label class="switch">
<input type="checkbox" onchange="toggle('electric_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="electric_block">
<div class="group">
<label>Электричество (₽)</label>
<input id="electric_norm" value="200" inputmode="decimal">
</div>
</div>

<div class="grid">
<div class="group">
<label>Маржа</label>
<select id="margin">
<option value="1">x1</option>
<option value="1.5">x1.5</option>
<option value="2">x2</option>
<option value="2.5">x2.5</option>
<option value="3">x3</option>
<option value="3.5">x3.5</option>
<option value="4">x4</option>
<option value="4.5">x4.5</option>
<option value="5">x5</option>
<option value="6">x6</option>
<option value="7">x7</option>
</select>
</div>
</div>

<div class="toggle">
<span>Налог 13%</span>
<label class="switch">
<input type="checkbox" id="tax">
<span class="slider"></span>
</label>
</div>

<button onclick="calc()">Рассчитать</button>
<div class="result" id="result"></div>
</div>
</div>

<div class="card">
<h2 style="color:#7CFFB2;">Расчет площади металла</h2>

<div class="group">
<label>Тип изделия</label>
<select id="metal_type" onchange="changeMetalType()">
<option value="round">Круглая труба</option>
<option value="profile">Профильная труба</option>
<option value="angle">Уголок</option>
<option value="channel">Швеллер</option>
<option value="ibeam">Двутавр</option>
</select>
</div>

<div id="round_block">
<div class="group">
<label>Диаметр (мм)</label>
<input id="round_d">
<label>Длина (мм)</label>
<input id="round_l">
<label>Количество</label>
<input id="round_count" value="1">
</div>
</div>

<div id="profile_block" style="display:none;">
<div class="group">
<label>Ширина (мм)</label>
<input id="profile_a">
<label>Высота (мм)</label>
<input id="profile_b">
<label>Длина (мм)</label>
<input id="profile_l">
<label>Количество</label>
<input id="profile_count" value="1">
</div>
</div>

<div id="angle_block" style="display:none;">
<div class="group">
<label>Полка A (мм)</label>
<input id="angle_a">
<label>Полка B (мм)</label>
<input id="angle_b">
<label>Длина (мм)</label>
<input id="angle_l">
<label>Количество</label>
<input id="angle_count" value="1">
</div>
</div>

<div id="channel_block" style="display:none;">
<div class="group">
<label>Ширина полки (мм)</label>
<input id="channel_a">
<label>Высота стенки (мм)</label>
<input id="channel_b">
<label>Длина (мм)</label>
<input id="channel_l">
<label>Количество</label>
<input id="channel_count" value="1">
</div>
</div>

<div id="ibeam_block" style="display:none;">
<div class="group">
<label>Ширина полки (мм)</label>
<input id="ibeam_a">
<label>Высота (мм)</label>
<input id="ibeam_b">
<label>Длина (мм)</label>
<input id="ibeam_l">
<label>Количество</label>
<input id="ibeam_count" value="1">
</div>
</div>

<button onclick="calcMetalArea()">Рассчитать площадь</button>
<button onclick="insertArea()" style="margin-top:10px;">Перенести площадь в калькулятор</button>
<div class="result" id="metal_result"></div>
</div>

<div class="card">
<h2 style="color:#7CFFB2;">Расход краски (отдельно)</h2>

<div class="group">
<label>Площадь (м²)</label>
<input id="paint_area_only">
<label>Засыпано (кг)</label>
<input id="paint_in_only">
<label>Остаток (кг)</label>
<input id="paint_out_only">
</div>

<button onclick="calcPaint()">Рассчитать расход</button>
<div class="result" id="result_paint"></div>
</div>
</div>

<script>
function toggle(id){
    document.getElementById(id).classList.toggle("show");
}

function num(id){
    return parseFloat(
        (document.getElementById(id).value || "0")
        .replace(",",".")
    ) || 0;
}

function isOn(id){
    return document.getElementById(id).classList.contains("show");
}

function calc(){
    let area = num("area_est");

    let paint =
        area *
        (num("paint_norm") / 1000) *
        num("paint_price_est");

    let sand =
        isOn("sand_block")
        ? num("sand_price") * num("sand_coef_est")
        : 0;

    let grind =
        isOn("grind_block")
        ? num("grind_price") * num("grind_coef_est")
        : 0;

    let clean =
        isOn("clean_block")
        ? num("clean_price") * num("clean_coef_est")
        : 0;

    let heavy =
        isOn("heavy_block")
        ? num("heavy_price") * num("heavy_coef_est")
        : 0;

    let gas =
        isOn("gas_block")
        ? num("gas_norm")
        : 0;

    let electric =
        isOn("electric_block")
        ? num("electric_norm")
        : 0;

    let cost = paint + sand + grind + clean + heavy + gas + electric;
    let priceBeforeTax = cost * num("margin");
    let profit = priceBeforeTax - cost;

    let tax =
        document.getElementById("tax").checked
        ? priceBeforeTax * 0.13
        : 0;

    let total = priceBeforeTax + tax;

    document.getElementById("result").innerHTML =
        "Краска: " + Math.round(paint) + " ₽<br>" +
        "Пескоструй: " + Math.round(sand) + " ₽<br>" +
        "Зачистка: " + Math.round(grind) + " ₽<br>" +
        "Обезжиривание: " + Math.round(clean) + " ₽<br>" +
        "Тяжелое изделие: " + Math.round(heavy) + " ₽<br>" +
        "Газ: " + Math.round(gas) + " ₽<br>" +
        "Электричество: " + Math.round(electric) + " ₽<br><br>" +
        "Себестоимость: " + Math.round(cost) + " ₽<br>" +
        "Прибыль по марже: " + Math.round(profit) + " ₽<br>" +
        "Цена до налога: " + Math.round(priceBeforeTax) + " ₽<br>" +
        "Налог: " + Math.round(tax) + " ₽<br><br>" +
        "ИТОГ: " + Math.round(total) + " ₽";
}

let lastMetalArea = 0;

function changeMetalType(){
    document.getElementById("round_block").style.display = "none";
    document.getElementById("profile_block").style.display = "none";
    document.getElementById("angle_block").style.display = "none";
    document.getElementById("channel_block").style.display = "none";
    document.getElementById("ibeam_block").style.display = "none";

    let type = document.getElementById("metal_type").value;
    document.getElementById(type + "_block").style.display = "block";
}

function calcMetalArea(){
    let type = document.getElementById("metal_type").value;
    let area = 0;

    if(type === "round"){
        let d = num("round_d") / 1000;
        let l = num("round_l") / 1000;
        let count = num("round_count");
        area = Math.PI * d * l * count;
    }

    if(type === "profile"){
        let a = num("profile_a") / 1000;
        let b = num("profile_b") / 1000;
        let l = num("profile_l") / 1000;
        let count = num("profile_count");
        area = (2 * (a + b)) * l * count;
    }

    if(type === "angle"){
        let a = num("angle_a") / 1000;
        let b = num("angle_b") / 1000;
        let l = num("angle_l") / 1000;
        let count = num("angle_count");
        area = (2 * (a + b)) * l * count;
    }

    if(type === "channel"){
        let a = num("channel_a") / 1000;
        let b = num("channel_b") / 1000;
        let l = num("channel_l") / 1000;
        let count = num("channel_count");
        area = ((4 * a) + (2 * b)) * l * count;
    }

    if(type === "ibeam"){
        let a = num("ibeam_a") / 1000;
        let b = num("ibeam_b") / 1000;
        let l = num("ibeam_l") / 1000;
        let count = num("ibeam_count");
        area = ((4 * a) + (2 * b)) * l * count;
    }

    lastMetalArea = area;

    document.getElementById("metal_result").innerHTML =
        "Площадь поверхности: " +
        area.toFixed(2) +
        " м²";
}

function insertArea(){
    document.getElementById("area_est").value =
        lastMetalArea.toFixed(2);
}

function calcPaint(){
    let area = num("paint_area_only");
    let inKg = num("paint_in_only");
    let outKg = num("paint_out_only");

    if(area <= 0){
        document.getElementById("result_paint").innerHTML =
            "Укажи площадь";
        return;
    }

    if(outKg > inKg){
        document.getElementById("result_paint").innerHTML =
            "Остаток не может быть больше, чем засыпано";
        return;
    }

    let used = inKg - outKg;
    let gPerM2 = (used * 1000) / area;

    document.getElementById("result_paint").innerHTML =
        "Израсходовано: " +
        used.toFixed(2) +
        " кг<br>" +
        "Расход: " +
        gPerM2.toFixed(1) +
        " г/м²";
}
</script>
</body>
</html>
