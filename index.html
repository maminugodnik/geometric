<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Калькулятор порошковой покраски</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html{
    width:100%;
    overflow-x:hidden;
}

body{
    margin:0;
    width:100%;
    overflow-x:hidden;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:#0b0f14;
    color:#e6f1ff;
}

body::before,
body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    filter:blur(140px);
    z-index:-1;
    pointer-events:none;
}

body::before{
    background:#00ff88;
    opacity:.18;
    top:-200px;
    left:-200px;
    animation:glowIntro 1.4s ease-out both;
}

body::after{
    background:#00b7ff;
    opacity:.12;
    bottom:-200px;
    right:-200px;
    animation:glowIntro 1.4s ease-out .15s both;
}

.container{
    width:100%;
    max-width:920px;
    margin:0 auto;
    padding:24px 16px 40px;
}

body.locked .container{
    display:none;
}

body.unlocked .lock-screen{
    display:none;
}

.lock-screen{
    min-height:100vh;
    width:100%;
    display:grid;
    place-items:center;
    padding:24px 16px;
    position:relative;
    z-index:2;
}

.lock-card{
    width:100%;
    max-width:440px;
    padding:28px;
    border-radius:18px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 24px 80px rgba(0,0,0,.32);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    animation:cardIntro .75s cubic-bezier(.2,.8,.2,1) both;
}

.lock-title{
    margin:0 0 8px;
    color:#7CFFB2;
    font-size:clamp(24px,6vw,34px);
    line-height:1.15;
}

.lock-text{
    margin:0 0 18px;
    color:#b7c7d9;
    line-height:1.5;
    font-size:14px;
}

.lock-error{
    min-height:22px;
    margin-top:12px;
    color:#ff8f8f;
    font-size:14px;
    line-height:1.4;
}

h1{
    text-align:center;
    color:#7CFFB2;
    margin:0 0 24px;
    font-size:clamp(24px,5vw,38px);
    line-height:1.2;
    word-break:break-word;
    animation:titleIntro .75s cubic-bezier(.2,.8,.2,1) .12s both;
}

h2{
    margin-top:0;
    font-size:clamp(18px,4vw,26px);
    line-height:1.3;
}

.card{
    width:100%;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
    padding:22px;
    margin-bottom:18px;
    overflow:hidden;
    opacity:0;
    transform:translateY(22px) scale(.985);
    animation:cardIntro .75s cubic-bezier(.2,.8,.2,1) forwards;
}

.card:nth-of-type(1){
    animation-delay:.05s;
}

.card:nth-of-type(2){
    animation-delay:.18s;
}

.card:nth-of-type(3){
    animation-delay:.31s;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    width:100%;
}

.group{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:12px;
    width:100%;
}

label{
    font-size:13px;
    color:#b7c7d9;
    line-height:1.4;
}

input,
select{
    width:100%;
    min-width:0;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.05);
    color:#7CFFB2;
    font-size:16px;
    outline:none;
    transition:.2s;
}

input{
    appearance:none;
    -webkit-appearance:none;
}

input:focus,
select:focus{
    border-color:#7CFFB2;
    box-shadow:0 0 0 3px rgba(124,255,178,.15);
}

select option{
    background:#0b0f14;
    color:#ffffff;
}

.toggle{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:14px;
    margin-top:16px;
    border-radius:14px;
    background:rgba(255,255,255,0.04);
}

.toggle span{
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
}

.switch{
    position:relative;
    width:46px;
    height:24px;
    flex-shrink:0;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;
    background:#2a2f3a;
    border-radius:30px;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    width:18px;
    height:18px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#7CFFB2;
}

.switch input:checked + .slider:before{
    transform:translateX(22px);
}

.block{
    overflow:hidden;
    max-height:0;
    opacity:0;
    transform:translateY(-8px);
    transition:
        max-height .35s ease,
        opacity .35s ease,
        transform .35s ease;
}

.block.show{
    max-height:500px;
    opacity:1;
    transform:translateY(0);
}

button{
    width:100%;
    margin-top:18px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#7CFFB2,#00b7ff);
    color:#051017;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.98);
}

.result{
    width:100%;
    margin-top:16px;
    padding:16px;
    border-radius:14px;
    background:rgba(255,255,255,0.04);
    color:#7CFFB2;
    line-height:1.7;
    overflow-wrap:break-word;
    word-break:break-word;
    font-size:15px;
}

.button-muted{
    background:rgba(255,255,255,0.08);
    color:#e6f1ff;
    border:1px solid rgba(255,255,255,0.1);
}

.button-danger{
    background:rgba(255,105,105,0.14);
    color:#ffb3b3;
    border:1px solid rgba(255,105,105,0.18);
}

.area-list{
    color:#dcecff;
}

.area-list strong{
    color:#7CFFB2;
}

.compact-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
}

@keyframes cardIntro{
    from{
        opacity:0;
        transform:translateY(22px) scale(.985);
        filter:blur(8px);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
    }
}

@keyframes titleIntro{
    from{
        opacity:0;
        transform:translateY(-10px);
        text-shadow:0 0 0 rgba(124,255,178,0);
    }

    to{
        opacity:1;
        transform:translateY(0);
        text-shadow:0 0 26px rgba(124,255,178,.18);
    }
}

@keyframes glowIntro{
    from{
        opacity:0;
        transform:scale(.72);
    }

    to{
        transform:scale(1);
    }
}

@media (prefers-reduced-motion:reduce){
    *,
    *::before,
    *::after{
        animation-duration:.01ms !important;
        animation-iteration-count:1 !important;
        scroll-behavior:auto !important;
        transition-duration:.01ms !important;
    }

    .card{
        opacity:1;
        transform:none;
        filter:none;
    }
}

@media (max-width:700px){
    .container{
        padding:14px 12px 30px;
    }

    .card{
        padding:16px;
        border-radius:16px;
    }

    .grid{
        grid-template-columns:1fr;
        gap:10px;
    }

    .compact-actions{
        grid-template-columns:1fr;
    }

    .toggle{
        padding:12px;
    }

    input,
    select{
        padding:13px;
    }

    button{
        padding:15px;
    }

    body::before,
    body::after{
        width:320px;
        height:320px;
        filter:blur(90px);
    }
}

@media (max-width:420px){
    h1{
        font-size:24px;
    }

    .card{
        padding:14px;
    }

    .lock-card{
        padding:22px;
        border-radius:16px;
    }

    .toggle span{
        font-size:14px;
    }

    label{
        font-size:12px;
    }

    input,
    select{
        font-size:16px;
        padding:12px;
    }

    .result{
        font-size:14px;
    }
}
</style>
</head>

<script>
const ACCESS_KEYS = [
    { key:"POKRASKA-2026", expires:"2026-12-31 23:59" },
    { key:"MASTER-2026", expires:"2027-12-31 23:59" },
    { key:"SAMARA-2026", expires:"2026-08-31 18:00" }
];

function openCalculator(){
    document.body.classList.remove("locked");
    document.body.classList.add("unlocked");
}

function getKeyInfo(key){
    return ACCESS_KEYS.find(item => item.key === key);
}

function getExpireDate(keyInfo){
    let expires = keyInfo.expires.trim();

    if(/^\d{4}-\d{2}-\d{2}$/.test(expires)){
        return new Date(expires + "T23:59:59");
    }

    return new Date(expires.replace(" ", "T"));
}

function isKeyActive(keyInfo){
    if(!keyInfo){
        return false;
    }

    return new Date() <= getExpireDate(keyInfo);
}

function saveAccess(keyInfo){
    localStorage.setItem("powder_calc_key", keyInfo.key);
    localStorage.setItem("powder_calc_access_until", keyInfo.expires);
}

function clearAccess(){
    localStorage.removeItem("powder_calc_access");
    localStorage.removeItem("powder_calc_key");
    localStorage.removeItem("powder_calc_access_until");
}

function checkAccessKey(){
    let key = document.getElementById("access_key").value.trim().toUpperCase();
    let error = document.getElementById("lock_error");
    let keyInfo = getKeyInfo(key);

    if(isKeyActive(keyInfo)){
        saveAccess(keyInfo);
        openCalculator();
        return false;
    }

    if(keyInfo){
        error.innerHTML = "Срок действия ключа истек";
    }else{
        error.innerHTML = "Неверный ключ доступа";
    }

    return false;
}

let savedKey = localStorage.getItem("powder_calc_key");
let savedKeyInfo = getKeyInfo(savedKey);

if(isKeyActive(savedKeyInfo)){
    openCalculator();
}else{
    clearAccess();
    document.getElementById("access_key").focus();
}

function toggle(id){
    document.getElementById(id).classList.toggle("show");
}

function num(id){
    return parseFloat(
        (document.getElementById(id).value || "0")
        .replace(",",".")
    ) || 0;
}

function isOn(id){
    return document.getElementById(id).classList.contains("show");
}

let paintPresets = [];

const DEFAULT_PAINT_PRESETS = [
    { name:"Стандарт", price:400 },
    { name:"Эконом", price:350 },
    { name:"Премиум", price:550 },
    { name:"Спеццвет", price:700 }
];

try{
    paintPresets = JSON.parse(localStorage.getItem("powder_calc_paint_presets") || "null") || DEFAULT_PAINT_PRESETS;
}catch(e){
    paintPresets = DEFAULT_PAINT_PRESETS;
}

if(!Array.isArray(paintPresets) || paintPresets.length === 0){
    paintPresets = DEFAULT_PAINT_PRESETS;
}

function savePaintPresets(){
    localStorage.setItem("powder_calc_paint_presets", JSON.stringify(paintPresets));
}

function renderPaintPresets(){
    let select = document.getElementById("paint_preset");

    if(!select){
        return;
    }

    select.innerHTML = '<option value="">Выбери краску</option>';

    paintPresets.forEach((preset, index) => {
        let option = document.createElement("option");
        option.value = index;
        option.textContent = preset.name + " — " + preset.price + " ₽/кг";
        select.appendChild(option);
    });
}

function applyPaintPreset(){
    let select = document.getElementById("paint_preset");
    let index = Number(select.value);
    let preset = paintPresets[index];

    if(!preset){
        return;
    }

    document.getElementById("paint_price_est").value = preset.price;
    document.getElementById("paint_preset_name").value = preset.name;
    document.getElementById("paint_preset_price").value = preset.price;
}

function newPaintPreset(){
    document.getElementById("paint_preset").value = "";
    document.getElementById("paint_preset_name").value = "";
    document.getElementById("paint_preset_price").value = "";
    document.getElementById("paint_preset_name").focus();
}

function savePaintPreset(){
    let select = document.getElementById("paint_preset");
    let name = document.getElementById("paint_preset_name").value.trim();
    let price = num("paint_preset_price");
    let index = Number(select.value);

    if(!name || price <= 0){
        return;
    }

    if(paintPresets[index]){
        paintPresets[index] = { name:name, price:price };
    }else{
        paintPresets.push({ name:name, price:price });
        index = paintPresets.length - 1;
    }

    savePaintPresets();
    renderPaintPresets();
    select.value = index;
    document.getElementById("paint_price_est").value = price;
}

function deletePaintPreset(){
    let select = document.getElementById("paint_preset");
    let index = Number(select.value);

    if(!paintPresets[index]){
        return;
    }

    paintPresets.splice(index, 1);
    savePaintPresets();
    renderPaintPresets();
    newPaintPreset();
}

function calc(){
    let area = num("area_est");

    let paint =
        area *
        (num("paint_norm") / 1000) *
        num("paint_price_est");

    let sand =
        isOn("sand_block")
        ? num("sand_price") * num("sand_coef_est")
        : 0;

    let grind =
        isOn("grind_block")
        ? num("grind_price") * num("grind_coef_est")
        : 0;

    let clean =
        isOn("clean_block")
        ? num("clean_price") * num("clean_coef_est")
        : 0;

    let heavy =
        isOn("heavy_block")
        ? num("heavy_price") * num("heavy_coef_est")
        : 0;

    let gas =
        isOn("gas_block")
        ? num("gas_norm")
        : 0;

    let electric =
        isOn("electric_block")
        ? num("electric_norm")
        : 0;

    let cost = paint + sand + grind + clean + heavy + gas + electric;
    let priceBeforeTax = cost * num("margin");
    let profit = priceBeforeTax - cost;

    let tax =
        document.getElementById("tax").checked
        ? priceBeforeTax * 0.13
        : 0;

    let total = priceBeforeTax + tax;

    document.getElementById("result").innerHTML =
        "Краска: " + Math.round(paint) + " ₽<br>" +
        "Пескоструй: " + Math.round(sand) + " ₽<br>" +
        "Зачистка: " + Math.round(grind) + " ₽<br>" +
        "Обезжиривание: " + Math.round(clean) + " ₽<br>" +
        "Тяжелое изделие: " + Math.round(heavy) + " ₽<br>" +
        "Газ: " + Math.round(gas) + " ₽<br>" +
        "Электричество: " + Math.round(electric) + " ₽<br><br>" +
        "Себестоимость: " + Math.round(cost) + " ₽<br>" +
        "Прибыль по марже: " + Math.round(profit) + " ₽<br>" +
        "Цена до налога: " + Math.round(priceBeforeTax) + " ₽<br>" +
        "Налог: " + Math.round(tax) + " ₽<br><br>" +
        "ИТОГ: " + Math.round(total) + " ₽";
}

let lastMetalArea = 0;
let metalItems = [];

try{
    metalItems = JSON.parse(localStorage.getItem("powder_calc_metal_items") || "[]");
}catch(e){
    metalItems = [];
}

if(!Array.isArray(metalItems)){
    metalItems = [];
}

const METAL_TYPE_NAMES = {
    round:"Круглая труба",
    profile:"Профильная труба",
    angle:"Уголок",
    channel:"Швеллер",
    ibeam:"Двутавр"
};

function saveMetalItems(){
    localStorage.setItem("powder_calc_metal_items", JSON.stringify(metalItems));
}

function getMetalTotal(){
    return metalItems.reduce((sum, item) => sum + item.area, 0);
}

function updateMetalTotalResult(){
    let result = document.getElementById("metal_total_result");

    if(!result){
        return;
    }

    if(metalItems.length === 0){
        result.innerHTML = "Общий расчет пуст";
        return;
    }

    let rows = metalItems
        .map((item, index) =>
            (index + 1) + ". " +
            item.name + ": " +
            item.area.toFixed(2) +
            " м²"
        )
        .join("<br>");

    result.innerHTML =
        rows +
        "<br><br><strong>Общая площадь: " +
        getMetalTotal().toFixed(2) +
        " м²</strong>";
}

function addMetalItem(type, area){
    metalItems.push({
        name:METAL_TYPE_NAMES[type] || "Изделие",
        area:area
    });

    saveMetalItems();
    updateMetalTotalResult();
}

function insertTotalArea(){
    document.getElementById("area_est").value =
        getMetalTotal().toFixed(2);
}

function removeLastMetalItem(){
    metalItems.pop();
    saveMetalItems();
    updateMetalTotalResult();
}

function clearMetalItems(){
    metalItems = [];
    saveMetalItems();
    updateMetalTotalResult();
}

function changeMetalType(){
    document.getElementById("round_block").style.display = "none";
    document.getElementById("profile_block").style.display = "none";
    document.getElementById("angle_block").style.display = "none";
    document.getElementById("channel_block").style.display = "none";
    document.getElementById("ibeam_block").style.display = "none";

    let type = document.getElementById("metal_type").value;
    document.getElementById(type + "_block").style.display = "block";
}

function calcMetalArea(){
    let type = document.getElementById("metal_type").value;
    let area = 0;

    if(type === "round"){
        let d = num("round_d") / 1000;
        let l = num("round_l") / 1000;
        let count = num("round_count");
        area = Math.PI * d * l * count;
    }

    if(type === "profile"){
        let a = num("profile_a") / 1000;
        let b = num("profile_b") / 1000;
        let l = num("profile_l") / 1000;
        let count = num("profile_count");
        area = (2 * (a + b)) * l * count;
    }

    if(type === "angle"){
        let a = num("angle_a") / 1000;
        let b = num("angle_b") / 1000;
        let l = num("angle_l") / 1000;
        let count = num("angle_count");
        area = (2 * (a + b)) * l * count;
    }

    if(type === "channel"){
        let a = num("channel_a") / 1000;
        let b = num("channel_b") / 1000;
        let l = num("channel_l") / 1000;
        let count = num("channel_count");
        area = ((4 * a) + (2 * b)) * l * count;
    }

    if(type === "ibeam"){
        let a = num("ibeam_a") / 1000;
        let b = num("ibeam_b") / 1000;
        let l = num("ibeam_l") / 1000;
        let count = num("ibeam_count");
        area = ((4 * a) + (2 * b)) * l * count;
    }

    if(area <= 0){
        lastMetalArea = 0;
        document.getElementById("metal_result").innerHTML =
            "Укажи размеры изделия";
        return;
    }

    lastMetalArea = area;
    addMetalItem(type, area);

    document.getElementById("metal_result").innerHTML =
        "Площадь поверхности: " +
        area.toFixed(2) +
        " м²<br>Позиция добавлена в общий расчет";
}

function insertArea(){
    document.getElementById("area_est").value =
        lastMetalArea.toFixed(2);
}

function calcPaint(){
    let area = num("paint_area_only");
    let inKg = num("paint_in_only");
    let outKg = num("paint_out_only");

    if(area <= 0){
        document.getElementById("result_paint").innerHTML =
            "Укажи площадь";
        return;
    }

    if(outKg > inKg){
        document.getElementById("result_paint").innerHTML =
            "Остаток не может быть больше, чем засыпано";
        return;
    }

    let used = inKg - outKg;
    let gPerM2 = (used * 1000) / area;

    document.getElementById("result_paint").innerHTML =
        "Израсходовано: " +
        used.toFixed(2) +
        " кг<br>" +
        "Расход: " +
        gPerM2.toFixed(1) +
        " г/м²";
}

updateMetalTotalResult();
renderPaintPresets();
</script>
