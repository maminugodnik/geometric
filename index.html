<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор порошковой покраски</title>

<style>
body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#0b0f14;
    color:#e6f1ff;
}

body::before, body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    filter:blur(140px);
    z-index:-1;
}
body::before{background:#00ff88;opacity:.18;top:-200px;left:-200px;}
body::after{background:#00b7ff;opacity:.12;bottom:-200px;right:-200px;}

.container{
    max-width:920px;
    margin:40px auto;
    padding:0 16px;
}

h1{
    text-align:center;
    color:#7CFFB2;
}

.card{
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
    padding:22px;
    margin-bottom:18px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

@media (max-width:700px){
    .grid{grid-template-columns:1fr;}
}

.group{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:10px;
}

label{
    font-size:12px;
    color:#b7c7d9;
}

input,select{
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    color:#7CFFB2;
}

select option{background:#0b0f14;}

/* toggle */
.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    margin-top:14px;
    border-radius:14px;
    background: rgba(255,255,255,0.04);
}

.switch{
    position:relative;
    width:46px;height:24px;
}
.switch input{display:none;}

.slider{
    position:absolute;
    inset:0;
    background:#2a2f3a;
    border-radius:30px;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    width:18px;height:18px;
    left:3px;top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:#7CFFB2;
}

.switch input:checked + .slider:before{
    transform:translateX(22px);
}

/* blocks */
.block{
    overflow:hidden;
    max-height:0;
    opacity:0;
    transform:translateY(-8px);
    transition:all .35s ease;
}

.block.show{
    max-height:220px;
    opacity:1;
    transform:translateY(0);
}

button{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#7CFFB2,#00b7ff);
    font-weight:800;
}

.result{
    margin-top:14px;
    padding:16px;
    border-radius:14px;
    background: rgba(255,255,255,0.04);
    color:#7CFFB2;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Калькулятор порошковой покраски</h1>

<!-- ================= MAIN ================= -->
<div class="group" style="grid-column:1 / -1;">

<label>Площадь (м²)</label>
<input id="area_est">

<label>Расход краски (г/м²)</label>
<input id="paint_norm" value="150">

<label>Цена краски (₽/кг)</label>
<input id="paint_price_est" value="400">

<!-- PESCO -->
<div class="toggle">
<span>Пескоструй</span>
<label class="switch">
<input type="checkbox" onchange="toggle('sand_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="sand_block">
<label>Цена пескоструя</label>
<input id="sand_price" value="500">

<label>Сложность</label>
<select id="sand_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>

<!-- GRIND -->
<div class="toggle">
<span>Зачистка</span>
<label class="switch">
<input type="checkbox" onchange="toggle('grind_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="grind_block">
<label>Цена зачистки</label>
<input id="grind_price" value="250">

<label>Сложность</label>
<select id="grind_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>

<!-- CLEAN -->
<div class="toggle">
<span>Обезжиривание</span>
<label class="switch">
<input type="checkbox" onchange="toggle('clean_block')">
<span class="slider"></span>
</label>
</div>

<div class="block" id="clean_block">
<label>Цена обезжиривания</label>
<input id="clean_price" value="150">

<label>Сложность</label>
<select id="clean_coef_est">
<option value="1">Лёгкая (0%)</option>
<option value="1.2">Средняя (+20%)</option>
<option value="1.5">Сложная (+50%)</option>
<option value="2">Очень сложная (+100%)</option>
</select>
</div>

<!-- FINANCE -->
<div class="grid">

<div class="group">
<label>Газ (₽)</label>
<input id="gas_norm" value="400">
</div>

<div class="group">
<label>Электричество (₽)</label>
<input id="electric_norm" value="200">
</div>

<div class="group">
<label>Маржа</label>
<select id="margin">
<option value="1">x1</option>
<option value="1.5">x1.5</option>
<option value="2">x2</option>
<option value="2.5">x2.5</option>
<option value="3">x3</option>
<option value="3.5">x3.5</option>
<option value="4">x4</option>
<option value="4.5">x4.5</option>
<option value="5">x5</option>
<option value="6">x6</option>
<option value="7">x7</option>
</select>
</div>

</div>

<div class="toggle">
<span>Налог 13%</span>
<label class="switch">
<input type="checkbox" id="tax">
<span class="slider"></span>
</label>
</div>

<button onclick="calc()">Рассчитать</button>

<div class="result" id="result"></div>

</div>

<!-- ================= PAINT SYSTEM ================= -->
<div class="card">

<h2 style="color:#7CFFB2;">Расход краски (отдельно)</h2>

<label>Площадь (м²)</label>
<input id="paint_area_only">

<label>Засыпано (кг)</label>
<input id="paint_in_only">

<label>Остаток (кг)</label>
<input id="paint_out_only">

<button onclick="calcPaint()">Рассчитать расход</button>

<div class="result" id="result_paint"></div>

</div>

</div>

<script>

function toggle(id){
    document.getElementById(id).classList.toggle("show");
}

function num(id){
    return parseFloat((document.getElementById(id).value||"0").replace(",","."));
}

/* MAIN CALC */
function calc(){

    let area = num("area_est");

    let paint = area * (num("paint_norm")/1000) * num("paint_price_est");

    let prep =
        (document.getElementById("sand_block").classList.contains("show") ? num("sand_price") * num("sand_coef_est") : 0) +
        (document.getElementById("grind_block").classList.contains("show") ? num("grind_price") * num("grind_coef_est") : 0) +
        (document.getElementById("clean_block").classList.contains("show") ? num("clean_price") * num("clean_coef_est") : 0);

    let base = paint + prep;

    let gas = num("gas_norm");
    let electric = num("electric_norm");

    let cost = base + gas + electric;

    let margin = cost * num("margin");

    let tax = document.getElementById("tax").checked ? margin * 0.13 : 0;

    let total = margin + tax;

    document.getElementById("result").innerHTML =
        "Себестоимость: " + Math.round(cost) + " ₽<br>" +
        "Маржа: " + Math.round(margin) + " ₽<br>" +
        "Налог: " + Math.round(tax) + " ₽<br><br>" +
        "ИТОГ: " + Math.round(total) + " ₽";
}

/* PAINT SYSTEM */
function calcPaint(){

    let area = num("paint_area_only");
    let inKg = num("paint_in_only");
    let outKg = num("paint_out_only");

    let used = Math.max(inKg - outKg, 0);

    if(area <= 0){
        document.getElementById("result_paint").innerHTML = "Укажи площадь";
        return;
    }

    let gPerM2 = (used * 1000) / area;

    document.getElementById("result_paint").innerHTML =
        "Израсходовано: " + used.toFixed(2) + " кг<br>" +
        "Расход: " + gPerM2.toFixed(1) + " г/м²";
}

</script>

</body>
</html>
